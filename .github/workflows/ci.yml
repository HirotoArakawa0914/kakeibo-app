name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: kakeibo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost:5432/kakeibo_test

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Rubyをセットアップ
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version   # プロジェクトの.ruby-versionを参照
          bundler-cache: true           # Gemをキャッシュして高速化

      - name: DBを作成してマイグレーション実行
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate

      - name: テストを実行
        run: bundle exec rails test